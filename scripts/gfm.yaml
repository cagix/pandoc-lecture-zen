## Options for GFM output (lecture handout)
## (see https://pandoc.org/MANUAL.html#defaults-files)

## general options
from: markdown+alerts+mark+smart+lists_without_preceding_blankline-implicit_figures
to: markdown+alerts+smart+four_space_rule-grid_tables-multiline_tables-simple_tables-bracketed_spans-fenced_divs


## reader options
filters:
  - ${.}/document/handout.lua
  - ${.}/document/markdown.lua
  - ${.}/elements/wrapcustomdivs.lua
  - ${.}/elements/credits.lua
  - ${.}/elements/ex.lua
  - ${.}/elements/image.lua
  - ${.}/elements/center.lua
  - ${.}/elements/details.lua
  - ${.}/elements/ghalerts.lua
  - ${.}/elements/bulletlist_displaymath.lua
  - ${.}/elements/deprecated.lua

metadata:
  link-citations: true

shift-heading-level-by: 1


## writer options
strip-comments: true


## citation rendering
citeproc: true
#csl: https://www.zotero.org/styles/springer-lecture-notes-in-computer-science
#csl: https://www.zotero.org/styles/springer-basic-author-date
